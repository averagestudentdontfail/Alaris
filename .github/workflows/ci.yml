name: Alaris CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run nightly builds
    - cron: '0 2 * * *'

env:
  CMAKE_VERSION: '3.20.0'
  BUILD_TYPE: Release

jobs:
  # Pre-build checks
  pre-checks:
    name: Pre-build Checks
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.changes.outputs.should_build }}
      version: ${{ steps.version.outputs.version }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        submodules: 'recursive'
    
    - name: Check for relevant changes
      id: changes
      run: |
        if [[ "${{ github.event_name }}" == "schedule" ]]; then
          echo "should_build=true" >> $GITHUB_OUTPUT
        elif git diff --name-only HEAD~1 | grep -E '\.(cpp|h|hpp|cmake|CMakeLists\.txt)$|docker/|scripts/|\.github/'; then
          echo "should_build=true" >> $GITHUB_OUTPUT
        else
          echo "should_build=false" >> $GITHUB_OUTPUT
        fi
    
    - name: Extract version
      id: version
      run: |
        if [[ $GITHUB_REF == refs/tags/* ]]; then
          VERSION=${GITHUB_REF#refs/tags/v}
        else
          VERSION="dev-$(git rev-parse --short HEAD)"
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Building version: $VERSION"

  # Build matrix for different platforms and configurations
  build-matrix:
    name: Build (${{ matrix.os }}, ${{ matrix.build_type }}, ${{ matrix.compiler }})
    runs-on: ${{ matrix.os }}
    needs: pre-checks
    if: needs.pre-checks.outputs.should_build == 'true'
    
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-20.04, macos-12, macos-13]
        build_type: [Release, Debug]
        compiler: [default]
        include:
          # GCC variants on Ubuntu
          - os: ubuntu-22.04
            build_type: Release
            compiler: gcc-11
            cc: gcc-11
            cxx: g++-11
          - os: ubuntu-22.04
            build_type: Release
            compiler: gcc-12
            cc: gcc-12
            cxx: g++-12
          # Clang variants on Ubuntu
          - os: ubuntu-22.04
            build_type: Release
            compiler: clang-14
            cc: clang-14
            cxx: clang++-14
          - os: ubuntu-22.04
            build_type: Release
            compiler: clang-15
            cc: clang-15
            cxx: clang++-15
        exclude:
          # Reduce matrix size for draft PRs
          - os: macos-12
            build_type: Debug
          - os: ubuntu-20.04
            build_type: Debug
    
    env:
      CC: ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'
        fetch-depth: 0
    
    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cache/ccache
          ~/vcpkg
          build/_deps
        key: ${{ matrix.os }}-${{ matrix.compiler }}-${{ matrix.build_type }}-${{ hashFiles('**/CMakeLists.txt') }}
        restore-keys: |
          ${{ matrix.os }}-${{ matrix.compiler }}-${{ matrix.build_type }}-
          ${{ matrix.os }}-${{ matrix.compiler }}-
          ${{ matrix.os }}-
    
    - name: Setup build environment (Ubuntu)
      if: startsWith(matrix.os, 'ubuntu')
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          ninja-build \
          ccache \
          libboost-all-dev \
          pkg-config \
          git
        
        # Install specific compiler versions
        if [[ "${{ matrix.compiler }}" == gcc-* ]]; then
          sudo apt-get install -y ${{ matrix.compiler }} ${{ matrix.cxx }}
        elif [[ "${{ matrix.compiler }}" == clang-* ]]; then
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh $(echo ${{ matrix.compiler }} | sed 's/clang-//')
        fi
    
    - name: Setup build environment (macOS)
      if: startsWith(matrix.os, 'macos')
      run: |
        brew install cmake ninja ccache boost pkg-config
        echo "/usr/local/bin" >> $GITHUB_PATH
        echo "/opt/homebrew/bin" >> $GITHUB_PATH
    
    - name: Setup ccache
      run: |
        ccache --set-config=cache_dir=$HOME/.cache/ccache
        ccache --set-config=max_size=2G
        ccache --set-config=compression=true
        ccache --zero-stats
    
    - name: Configure CMake
      run: |
        cmake -B build \
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
          -DCMAKE_CXX_STANDARD=20 \
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
          -GNinja
    
    - name: Build
      run: |
        cmake --build build --config ${{ matrix.build_type }} --parallel $(nproc)
    
    - name: Show ccache statistics
      run: ccache --show-stats
    
    - name: Run tests
      working-directory: build
      run: |
        ctest --output-on-failure --parallel $(nproc) --timeout 300
    
    - name: Upload build artifacts
      if: matrix.build_type == 'Release' && matrix.compiler == 'default'
      uses: actions/upload-artifact@v3
      with:
        name: alaris-${{ matrix.os }}-${{ needs.pre-checks.outputs.version }}
        path: |
          build/bin/quantlib_process
          build/bin/alaris_*
        retention-days: 7
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: test-results-${{ matrix.os }}-${{ matrix.compiler }}-${{ matrix.build_type }}
        path: |
          build/Testing/
          build/**/*_test.xml
        retention-days: 3

  # Static analysis
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-22.04
    needs: pre-checks
    if: needs.pre-checks.outputs.should_build == 'true'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'
    
    - name: Setup analysis tools
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          clang-tidy \
          cppcheck \
          clang-format \
          iwyu
    
    - name: Run clang-format check
      run: |
        find src test -name '*.cpp' -o -name '*.h' -o -name '*.hpp' | \
        xargs clang-format --dry-run --Werror
    
    - name: Configure for analysis
      run: |
        cmake -B build \
          -DCMAKE_BUILD_TYPE=Debug \
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
          -DCMAKE_CXX_CLANG_TIDY="clang-tidy;-checks=-*,readability-*,performance-*,modernize-*"
    
    - name: Run static analysis
      run: |
        cmake --build build --target alaris_core -- -k 0 || true
        
        # Run cppcheck
        cppcheck --enable=all --error-exitcode=1 \
          --suppress=missingIncludeSystem \
          --suppress=unusedFunction \
          src/
    
    - name: Upload analysis results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: static-analysis-results
        path: |
          build/compile_commands.json
          static-analysis-report.txt
        retention-days: 7

  # Security scanning
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: pre-checks
    if: needs.pre-checks.outputs.should_build == 'true'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'
    
    - name: Run CodeQL analysis
      uses: github/codeql-action/init@v2
      with:
        languages: cpp
        queries: security-and-quality
    
    - name: Build for CodeQL
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake libboost-all-dev
        cmake -B build -DCMAKE_BUILD_TYPE=Release
        cmake --build build --parallel $(nproc)
    
    - name: Perform CodeQL analysis
      uses: github/codeql-action/analyze@v2

  # Docker builds
  docker-build:
    name: Docker Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: pre-checks
    if: needs.pre-checks.outputs.should_build == 'true'
    
    strategy:
      matrix:
        service: [quantlib, lean]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'
    
    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Login to GitHub Container Registry
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository }}/alaris-${{ matrix.service }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha
    
    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        file: docker/Dockerfile.${{ matrix.service }}
        platforms: linux/amd64,linux/arm64
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          VERSION=${{ needs.pre-checks.outputs.version }}
          BUILD_TYPE=Release

  # Performance benchmarks
  benchmarks:
    name: Performance Benchmarks
    runs-on: ubuntu-22.04
    needs: [pre-checks, build-matrix]
    if: needs.pre-checks.outputs.should_build == 'true' && github.event_name != 'pull_request'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'
    
    - name: Setup environment
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake ninja-build libboost-all-dev
    
    - name: Configure with benchmarks
      run: |
        cmake -B build \
          -DCMAKE_BUILD_TYPE=Release \
          -DALARIS_BUILD_WITH_BENCHMARK=ON \
          -GNinja
    
    - name: Build benchmarks
      run: cmake --build build --parallel $(nproc)
    
    - name: Run benchmarks
      run: |
        cd build
        ./bin/alaris_benchmark --benchmark_format=json \
          --benchmark_out=benchmark_results.json
    
    - name: Upload benchmark results
      uses: actions/upload-artifact@v3
      with:
        name: benchmark-results-${{ needs.pre-checks.outputs.version }}
        path: build/benchmark_results.json
        retention-days: 30

  # Integration tests
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-22.04
    needs: [pre-checks, build-matrix]
    if: needs.pre-checks.outputs.should_build == 'true'
    
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'
    
    - name: Download build artifacts
      uses: actions/download-artifact@v3
      with:
        name: alaris-ubuntu-22.04-${{ needs.pre-checks.outputs.version }}
        path: ./bin/
    
    - name: Setup permissions
      run: chmod +x ./bin/*
    
    - name: Run integration tests
      run: |
        # Set up test environment
        mkdir -p /tmp/alaris/logs
        mkdir -p /tmp/alaris/data
        
        # Run system info check
        ./bin/alaris_sysinfo --health-check
        
        # Validate configuration
        ./bin/alaris_config_validator config/quantlib_process.yaml
    
    - name: Upload integration test results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: integration-test-results
        path: /tmp/alaris/logs/
        retention-days: 3

  # Release
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-matrix, static-analysis, docker-build, integration-tests]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Download all artifacts
      uses: actions/download-artifact@v3
      with:
        path: artifacts/
    
    - name: Create release assets
      run: |
        mkdir -p release/
        
        # Package binaries for each platform
        for dir in artifacts/alaris-*; do
          if [[ -d "$dir" ]]; then
            platform=$(basename "$dir" | sed 's/alaris-//')
            tar -czf "release/alaris-${platform}.tar.gz" -C "$dir" .
          fi
        done
        
        # Create source archive
        git archive --format=tar.gz --prefix=alaris-${GITHUB_REF#refs/tags/v}/ \
          HEAD > release/alaris-source.tar.gz
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: release/*
        draft: false
        prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Cleanup
  cleanup:
    name: Cleanup
    runs-on: ubuntu-latest
    needs: [build-matrix, static-analysis, docker-build, integration-tests]
    if: always()
    
    steps:
    - name: Delete temporary artifacts
      if: github.event_name == 'pull_request'
      uses: geekyeggo/delete-artifact@v2
      with:
        name: |
          test-results-*
          static-analysis-results
        failOnError: false