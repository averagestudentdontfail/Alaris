version: '3.8'

services:
  quantlib-process:
    build:
      context: .
      dockerfile: Dockerfile.quantlib
    container_name: alaris-quantlib
    restart: unless-stopped
    
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '2.0'
          memory: 4G
    
    cap_add:
      - SYS_NICE
      - IPC_LOCK
    
    volumes:
      - /dev/shm:/dev/shm
      - ./config:/opt/alaris/config:ro
      - ./logs:/var/log/alaris
      - alaris-shared:/shared
    
    environment:
      - ALARIS_CONFIG_FILE=/opt/alaris/config/quantlib_process.yaml
      - ALARIS_LOG_LEVEL=INFO
    
    networks:
      - alaris-net
    
    healthcheck:
      test: ["CMD", "/opt/alaris/bin/health_check.sh"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  lean-process:
    build:
      context: .
      dockerfile: Dockerfile.lean
    container_name: alaris-lean
    restart: unless-stopped
    
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
    
    volumes:
      - /dev/shm:/dev/shm
      - ./config:/opt/alaris/config:ro
      - ./logs:/var/log/alaris
    
    environment:
      - DOTNET_GCServer=1
      - DOTNET_gcConcurrent=1
    
    networks:
      - alaris-net
    
    depends_on:
      quantlib-process:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    container_name: alaris-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
    networks:
      - alaris-net

  grafana:
    image: grafana/grafana:latest
    container_name: alaris-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=alaris123
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - alaris-net
    depends_on:
      - prometheus

networks:
  alaris-net:
    driver: bridge

volumes:
  alaris-shared:
  prometheus-data:
  grafana-data:
