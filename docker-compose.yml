version: '3.8'

services:
  # QuantLib Process - Core trading engine
  quantlib-process:
    build:
      context: .
      dockerfile: docker/Dockerfile.quantlib
      args:
        BUILD_TYPE: ${BUILD_TYPE:-Release}
        CMAKE_BUILD_PARALLEL_LEVEL: ${CMAKE_BUILD_PARALLEL_LEVEL:-4}
        ENABLE_OPTIMIZATIONS: ${ENABLE_OPTIMIZATIONS:-ON}
    image: alaris/quantlib-process:${VERSION:-latest}
    container_name: alaris-quantlib-process
    restart: unless-stopped
    
    # Performance and real-time optimizations
    privileged: false
    security_opt:
      - no-new-privileges:true
    cap_add:
      - SYS_NICE      # For real-time scheduling
      - IPC_LOCK      # For memory locking
    
    # CPU and memory configuration
    cpus: '2.0'
    mem_limit: 4g
    mem_reservation: 2g
    
    # Shared memory configuration
    shm_size: 1g
    ipc: shareable
    
    # Environment variables
    environment:
      - ALARIS_CONFIG_FILE=/opt/alaris/config/quantlib_process.yaml
      - ALARIS_LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ALARIS_ENABLE_PROFILING=${ENABLE_PROFILING:-false}
      - OMP_NUM_THREADS=1  # Disable OpenMP for deterministic execution
      - MALLOC_ARENA_MAX=1  # Reduce memory fragmentation
    
    # Volume mounts
    volumes:
      - ./config:/opt/alaris/config:ro
      - ./logs:/var/log/alaris:rw
      - shared-memory:/dev/shm/alaris:rw
      - ./data:/opt/alaris/data:rw
    
    # Network configuration
    networks:
      - alaris-network
    
    # Health check
    healthcheck:
      test: ["CMD", "/opt/alaris/bin/alaris_sysinfo", "--health-check"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
        labels: "service=quantlib-process"
    
    # Labels for monitoring
    labels:
      - "com.alaris.service=quantlib-process"
      - "com.alaris.version=${VERSION:-latest}"
      - "com.alaris.build-type=${BUILD_TYPE:-Release}"

  # Lean Process - .NET trading interface
  lean-process:
    build:
      context: .
      dockerfile: docker/Dockerfile.lean
      args:
        DOTNET_VERSION: ${DOTNET_VERSION:-8.0}
        CONFIGURATION: ${LEAN_CONFIGURATION:-Release}
    image: alaris/lean-process:${VERSION:-latest}
    container_name: alaris-lean-process
    restart: unless-stopped
    
    # Resource limits
    cpus: '1.0'
    mem_limit: 2g
    mem_reservation: 1g
    
    # Shared memory access
    ipc: container:alaris-quantlib-process
    
    # Environment variables
    environment:
      - ALARIS_CONFIG_FILE=/opt/alaris/config/lean_process.yaml
      - ALARIS_LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DOTNET_RUNNING_IN_CONTAINER=true
      - DOTNET_EnableDiagnostics=0  # Disable diagnostics for production
      - COMPlus_gcServer=1          # Enable server GC
      - COMPlus_gcConcurrent=1      # Enable concurrent GC
    
    # Volume mounts
    volumes:
      - ./config:/opt/alaris/config:ro
      - ./logs:/var/log/alaris:rw
      - shared-memory:/dev/shm/alaris:rw
      - ./data:/opt/alaris/data:rw
    
    # Network configuration
    networks:
      - alaris-network
    
    # Dependencies
    depends_on:
      quantlib-process:
        condition: service_healthy
    
    # Health check
    healthcheck:
      test: ["CMD", "dotnet", "--info"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
        labels: "service=lean-process"
    
    # Labels
    labels:
      - "com.alaris.service=lean-process"
      - "com.alaris.version=${VERSION:-latest}"

  # Prometheus - Metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: alaris-prometheus
    restart: unless-stopped
    
    # Resource limits
    cpus: '0.5'
    mem_limit: 1g
    
    # Configuration
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=10GB'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    
    ports:
      - "9090:9090"
    
    networks:
      - alaris-network
    
    # Health check
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    
    labels:
      - "com.alaris.service=prometheus"

  # Grafana - Metrics visualization
  grafana:
    image: grafana/grafana:latest
    container_name: alaris-grafana
    restart: unless-stopped
    
    # Resource limits
    cpus: '0.5'
    mem_limit: 512m
    
    # Environment variables
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-alaris123}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_USERS_ALLOW_ORG_CREATE=false
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    
    ports:
      - "3000:3000"
    
    networks:
      - alaris-network
    
    depends_on:
      - prometheus
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    
    labels:
      - "com.alaris.service=grafana"

  # Redis - Optional caching and message broker
  redis:
    image: redis:7-alpine
    container_name: alaris-redis
    restart: unless-stopped
    
    # Resource limits
    cpus: '0.25'
    mem_limit: 256m
    
    # Configuration
    command: >
      redis-server 
      --save 900 1 
      --save 300 10 
      --save 60 10000 
      --maxmemory 128mb 
      --maxmemory-policy allkeys-lru
      --appendonly yes
    
    volumes:
      - redis-data:/data
    
    ports:
      - "6379:6379"
    
    networks:
      - alaris-network
    
    # Health check
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    
    labels:
      - "com.alaris.service=redis"

  # Log aggregator (optional)
  fluentd:
    build:
      context: ./docker/fluentd
      dockerfile: Dockerfile
    image: alaris/fluentd:${VERSION:-latest}
    container_name: alaris-fluentd
    restart: unless-stopped
    
    # Resource limits
    cpus: '0.25'
    mem_limit: 512m
    
    volumes:
      - ./logs:/var/log/alaris:ro
      - ./monitoring/fluentd/fluent.conf:/fluentd/etc/fluent.conf:ro
    
    ports:
      - "24224:24224"
      - "24224:24224/udp"
    
    networks:
      - alaris-network
    
    depends_on:
      - quantlib-process
      - lean-process
    
    labels:
      - "com.alaris.service=fluentd"

# Network configuration
networks:
  alaris-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# Volume configuration
volumes:
  shared-memory:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=1g,uid=1000,gid=1000

  prometheus-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/prometheus

  grafana-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/grafana

  redis-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/redis

# Development override
x-development-overrides:
  quantlib-process:
    build:
      args:
        BUILD_TYPE: Debug
        ENABLE_OPTIMIZATIONS: OFF
    environment:
      - ALARIS_LOG_LEVEL=DEBUG
      - ALARIS_ENABLE_PROFILING=true
    volumes:
      - .:/workspace:rw  # Mount source code for development
    working_dir: /workspace

  lean-process:
    build:
      args:
        CONFIGURATION: Debug
    environment:
      - ALARIS_LOG_LEVEL=DEBUG
      - COMPlus_gcServer=0  # Use workstation GC for development
    volumes:
      - .:/workspace:rw
    working_dir: /workspace