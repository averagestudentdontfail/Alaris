# QuantLib Process Configuration
process:
  name: "QuantLib"
  priority: 80
  cpu_affinity: [2, 3]
  memory_lock: false
  huge_pages: false
  start_trading_enabled: false

quantlib:
  threading: "single"
  date_format: "ISO"
  calendar: "UnitedStates"
  enable_debug: false

# UPDATED: POSIX-compliant shared memory names
shared_memory:
  market_data_buffer: "/alaris_market_data"
  signal_buffer: "/alaris_signals"
  control_buffer: "/alaris_control"
  buffer_sizes:
    market_data: 4096
    signals: 1024
    control: 256

memory:
  pool_size_mb: 8

pricing:
  alo_engine:
    scheme: "fast"
    fixed_point_equation: "Auto"

volatility:
  garch:
    max_iterations: 500
    tolerance: 1e-6
    mode: "BestOfTwo"
    max_history_length: 126
  update_frequency_ms: 10

strategy:
  vol_arbitrage:
    entry_threshold: 0.05
    exit_threshold: 0.02
    confidence_threshold: 0.7
    max_portfolio_delta: 0.10
    max_portfolio_gamma: 0.05
    max_portfolio_vega: 2.0
    max_position_size: 0.05
    max_correlation_exposure: 0.30
    kelly_fraction: 0.05
    max_kelly_position: 0.20
    min_edge_ratio: 2.0
    stop_loss_percent: 0.15
    profit_target_percent: 0.30
    trailing_stop_percent: 0.10
    strategy_mode: "DELTA_NEUTRAL"
    model_selection: "garch_direct"
    hedge_threshold_delta: 0.10
    hedge_threshold_gamma: 0.05
    auto_hedge_enabled: true
    hedge_frequency_minutes: 15
    low_vol_threshold: 0.15
    high_vol_threshold: 0.40
    regime_lookback_days: 21

logging:
  level: "INFO"
  file: "/home/send2/.projects/Alaris/logs/quantlib.log"
  binary_mode: false
  enable_performance_log: true