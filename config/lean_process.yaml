# config/lean_process.yaml
algorithm:
  # The name of your algorithm class inside the C# project.
  name: "Alaris.Algorithm.ArbitrageAlgorithm"
  
  # Default backtesting period. Can be overridden by command-line arguments.
  start_date: "2023-01-01"
  end_date: "2024-12-31"
  
  # Starting cash for the portfolio.
  cash: 1000000

# IBKR Brokerage configuration for both paper and live trading.
brokerage:
  # Must be "InteractiveBrokers" for the system to load the correct handler.
  type: "InteractiveBrokers"
  host: "172.31.16.1"
  paper_port: 4002
  live_port: 4001
  
  # Your IBKR account ID (e.g., "DU1234567" for paper accounts).
  account: "DUE407919"
  
  # Unique client ID for this API connection.
  client_id: 100

# Defines the universe of symbols the algorithm will trade.
universe:
  symbols:
    - "SPY"
    - "QQQ"
    - "IWM"
    - "EFA"
    - "VTI"
    - "AAPL"
    - "MSFT"
    - "GOOGL"
    - "AMZN"
    - "NVDA"
    - "JPM"
    - "BAC"
    - "WFC"
    - "GS"
    - "MS"
    - "XOM"
    - "CVX"
    - "COP"
    - "EOG"
    - "SLB"
    - "JNJ"
    - "PFE"
    - "UNH"
    - "ABBV"
    - "MRK"

# Shared memory settings must match quantlib_process.yaml for IPC.
shared_memory:
  market_data_buffer: "/alaris_market_data"
  signal_buffer: "/alaris_signals"
  control_buffer: "/alaris_control"

# Logging configuration for the C# Lean process.
logging:
  # Options: "DEBUG", "INFO", "WARN", "ERROR"
  level: "INFO"
  # Log file will be placed in the build directory.
  file: "alaris_lean.log"

api-credentials:
  job-user-id: 324116
  api-access-token: "50c451983d2212d45991382271acdd62429e444a2b5e83c39c6662156c879b42"
