# Lean Process Configuration
algorithm:
  name: "Lean"
  start_date: "2024-01-01"
  end_date: "2024-12-31"
  cash: 1000000

brokerage:
  type: "InteractiveBrokers"
  gateway_host: "127.0.0.1"
  gateway_port: 4002
  account: "DUE407919"

data:
  provider: "InteractiveBrokers"
  resolution: "Minute"

# UPDATED: Consistent and POSIX-compliant shared memory names
shared_memory:
  market_data_buffer: "/alaris_market_data"
  signal_buffer: "/alaris_signals"
  control_buffer: "/alaris_control"

# Add these configurations for the C# Config.Get calls
alaris-market-data-buffer: "/alaris_market_data"
alaris-signal-buffer: "/alaris_signals"
alaris-control-buffer: "/alaris_control"

risk_management:
  max_position_size: 0.05
  max_daily_loss: 0.02

universe:
  symbols: ["SPY", "QQQ", "IWM", "EFA", "EEM"]
  option_chains: true

logging:
  level: "INFO"
  file: "/var/log/alaris/lean.log"

ib_settings:
  connection_timeout: 30
  enable_market_data: true
  order_timeout_seconds: 60
  paper_trading:
    enabled: true
    starting_cash: 1000000
  live_trading:
    enabled: false